{% extends 'base.html' %}
{% block title %}Delete Goal — Loan Tracker TJ{% endblock %}

{% block content %}

<div class="delete-wrap">
    <div class="delete-card">

        <div style="font-size:48px;margin-bottom:16px">🗑️</div>

        <h2 style="color:#e2e8f0;font-size:18px;font-weight:600;margin-bottom:8px">
            Delete Goal?
        </h2>

        <p style="color:#64748b;font-size:13px;margin-bottom:16px">
            Are you sure you want to delete this goal?
        </p>

        <div style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:14px;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:10px">
                <div style="font-size:28px">{{ goal.icon }}</div>
                <div>
                    <div style="color:#fca5a5;font-size:14px;font-weight:600">{{ goal.title }}</div>
                    <div style="color:#f87171;font-size:12px">
                        {{ goal.current_amount }} / {{ goal.target_amount }} TJS
                    </div>
                </div>
            </div>
        </div>

        <form method="post">
            {% csrf_token %}
            <div style="display:flex;gap:10px;justify-content:center">
                <button type="submit" class="btn btn-danger">Yes, delete</button>
                <a href="/goals/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
