{% extends 'base.html' %}
{% block title %}Register - Loan Tracker TJ{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div class="auth-head">
            <div class="auth-mark">LT</div>
            <h2 class="auth-title" data-t="reg_title">Create account</h2>
            <p class="auth-sub" data-t="reg_sub">Join Loan Tracker TJ today</p>
        </div>

        {% if error %}
            <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" data-t="label_username">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label class="form-label" data-t="label_email">Email</label>
                <input type="email" name="email" class="form-input" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label class="form-label" data-t="label_password">Password</label>
                <input type="password" name="password1" class="form-input" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label class="form-label" data-t="label_confirm">Confirm password</label>
                <input type="password" name="password2" class="form-input" placeholder="Repeat password">
            </div>
            <button type="submit" class="btn btn-primary auth-submit" data-t="btn_register">Sign up</button>
        </form>

        <p class="auth-foot">
            Already have account?
            <a href="/accounts/login/" data-t="link_login">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
