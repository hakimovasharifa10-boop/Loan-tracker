{% extends 'base.html' %}
{% block title %}Login - Loan Tracker TJ{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div class="auth-head">
            <div class="auth-mark">LT</div>
            <h2 class="auth-title" data-t="login_title">Welcome back</h2>
            <p class="auth-sub" data-t="login_sub">Login with username or email</p>
        </div>

        {% if error %}
            <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" data-t="label_username_email">Username or Email</label>
                <input type="text" name="username" class="form-input" placeholder="Enter username or email">
            </div>
            <div class="form-group">
                <label class="form-label" data-t="label_password">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary auth-submit" data-t="btn_login">Log in</button>
        </form>

        <p class="auth-foot">
            No account?
            <a href="/accounts/register/" data-t="link_register">Sign up for free</a>
        </p>
    </div>
</div>
{% endblock %}
