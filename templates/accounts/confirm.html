{% extends 'base.html' %}
{% block title %}Confirm Email - Loan Tracker TJ{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div class="auth-head">
            <div class="auth-mark">LT</div>
            <h2 class="auth-title">Check your email</h2>
            <p class="auth-sub">We sent a 6-digit code to your email.</p>
        </div>

        {% if error %}
            <div class="alert-error">{{ error }}</div>
        {% endif %}

        <div class="ai-answer">
            <strong>Code sent</strong>
            <span>{{ user.email }}</span>
        </div>

        <form method="post" action="/accounts/confirm-email/">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="Enter your email" value="{{ user.email }}">
            </div>
            <div class="form-group">
                <label class="form-label">Confirmation code</label>
                <input type="text" name="code" class="form-input" placeholder="Enter 6-digit code" maxlength="6">
            </div>
            <button type="submit" class="btn btn-primary auth-submit">Confirm</button>
        </form>

        <p class="auth-foot">
            Wrong email?
            <a href="/accounts/register/">Go back</a>
        </p>
    </div>
</div>
{% endblock %}
